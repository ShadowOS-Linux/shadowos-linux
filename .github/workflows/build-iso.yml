name: Build ISO
on:
  workflow_run:
    workflows: ["bluebuild"]
    types: [completed]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ISO
        uses: jasonn3/build-container-installer@v1.2.4
        id: iso_build
        with:
          arch: x86_64
          image_name: shadowos-linux
          image_repo: ghcr.io/shadowos-linux
          image_tag: latest

      - name: Get current date
        id: date
        run: echo "date=$(date +'%d-%m-%Y')" >> $GITHUB_OUTPUT

      - name: Upload ISO as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: shadowos-iso-${{ steps.date.outputs.date }}
          path: |
            ${{ steps.iso_build.outputs.iso_path }}
            ${{ steps.iso_build.outputs.iso_checksum_path }}
          retention-days: 7
          if-no-files-found: error
