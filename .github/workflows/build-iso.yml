name: Build ISO and Release
on:
  workflow_run:
    workflows: ["bluebuild"] # Matches the 'name' in your build.yml
    types: [completed]
  workflow_dispatch: # Manual trigger for testing

jobs:
  build-iso:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: write 
      packages: read  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Generate the ISO
      - name: Generate ISO
        uses: blue-build/apps@main
        with:
          action: generate-iso
          recipe: 'recipe.yml'
          # Replace 'your-username' with your actual GitHub username
          image-url: ghcr.io/your-username/shadowos-linux:latest

      # 2. Get the current date (DD-MM-YYYY)
      - name: Get current date
        id: date
        run: echo "date=$(date +'%d-%m-%Y')" >> $GITHUB_OUTPUT

      # 3. Create Release and Upload
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.date.outputs.date }}-${{ github.run_number }}"
          name: "ShadowOS Linux (${{ steps.date.outputs.date }})"
          body: |
            Automated Build of ShadowOS.
            Based on Bazzite-NVIDIA with COSMIC DE.
            Build ID: ${{ github.run_id }}
          files: |
            ./output/*.iso
            ./output/*.sha256
        env:
          GITHUB_TOKEN: ${{ github.token }}
