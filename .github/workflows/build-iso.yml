name: Build ISO
on:
  workflow_run:
    workflows: ["bluebuild"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ISO
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - shadowos-linux
          - shadowos-linux-nvidia
          - shadowos-linux-steam
          - shadowos-linux-nvidia-steam
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Maximize build space
        uses: jlumbroso/free-disk-space@main
        with:	
          tool-cache: true

      - name: Checkout
        uses: actions/checkout@main

      - name: Generate Metadata
        id: meta
        shell: bash
        run: |
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Fetch Fedora Release
        id: clean_version
        shell: bash
        run: |
          MAX_RETRIES=5
          RETRY_COUNT=0
          SUCCESS=false
          
          URL="https://fedoraproject.org/releases.json"

          until [ $RETRY_COUNT -ge $MAX_RETRIES ] || [ "$SUCCESS" = true ]; do
            echo "Attempting to fetch Fedora releases (Attempt $((RETRY_COUNT + 1))...)"
            
            RESPONSE=$(curl -fsSL "$URL" || echo "failed")

            if [ "$RESPONSE" != "failed" ]; then
              VERSION=$(echo "$RESPONSE" | grep -oE '"version": "[0-9]+"' | grep -oE '[0-9]+' | sort -rn | head -n 1)
              
              if [ -n "$VERSION" ]; then
                echo "stable_one=$VERSION" >> $GITHUB_OUTPUT
                echo "Selected Fedora Version: $VERSION"
                SUCCESS=true
              else
                echo "Connected, but couldn't parse a version number."
              fi
            else
              echo "Connection failed. Waiting 10 seconds..."
              sleep 10
              RETRY_COUNT=$((RETRY_COUNT + 1))
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo "Failed to fetch Fedora versions after $MAX_RETRIES attempts."
            exit 1
          fi

      - name: Determine Flatpak Dependencies
        id: flatpak_dependencies
        shell: bash
        run: |
          set -ex
          # Use the newly built image as the base for resolution
          image="ghcr.io/shadowos-linux/${{ matrix.image }}:latest"
          TEMP_FLATPAK_INSTALL_DIR=$(mktemp -d -p ${{ github.workspace }} flatpak.XXX)
          FLATPAK_REFS_DIR="${{ github.workspace }}/files/flatpak"
          FLATPAK_REFS_DIR_LIST=$(cat ${FLATPAK_REFS_DIR}/* | tr '\n' ' ' )
          cat << EOF > ${TEMP_FLATPAK_INSTALL_DIR}/script.sh
          set -ex
          mkdir -p /flatpak/flatpak /flatpak/triggers
          mkdir /var/tmp || true
          chmod -R 1777 /var/tmp
          flatpak config --system --set languages "*"
          flatpak remote-add --system flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --system -y ${FLATPAK_REFS_DIR_LIST}
          # This command creates the 'flatpaks_with_deps' file that the builder needs
          ostree refs --repo=/flatpak/flatpak/repo | grep '^deploy/' | grep -v 'org\.freedesktop\.Platform\.openh264' | sed 's/^deploy\///g' > /output/flatpaks_with_deps
          EOF
          docker run --rm --privileged \
            --entrypoint bash \
            -e FLATPAK_SYSTEM_DIR=/flatpak/flatpak \
            -e FLATPAK_TRIGGERSDIR=/flatpak/triggers \
            --volume ${FLATPAK_REFS_DIR}:/output \
            --volume ${TEMP_FLATPAK_INSTALL_DIR}:/temp_flatpak_install_dir \
            ${image} /temp_flatpak_install_dir/script.sh
            
      - name: Build ISO
        uses: jasonn3/build-container-installer@main
        id: iso_build
        with:
          arch: x86_64
          image_name: ${{ matrix.image }}
          image_repo: ghcr.io/shadowos-linux 
          image_tag: latest
          version: ${{ steps.clean_version.outputs.stable_one }}
          variant: cosmic-atomic
          flatpak_remote_refs_dir: 'files/flatpak'
          enable_flatpak_dependencies: "false"
          iso_name: ${{ matrix.image }}-f${{ steps.clean_version.outputs.stable_one }}-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha_short }}.iso

      - name: Upload ISO to Job Artifacts
        uses: actions/upload-artifact@main
        with:
          path: |
            ${{ steps.iso_build.outputs.iso_path }}/${{ matrix.image }}-f${{ steps.clean_version.outputs.stable_one }}-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha_short }}.iso
            ${{ steps.iso_build.outputs.iso_path }}/${{ matrix.image }}-f${{ steps.clean_version.outputs.stable_one }}-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha_short }}.iso-CHECKSUM
          name: ${{ matrix.image }}-f${{ steps.clean_version.outputs.stable_one }}-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha_short }}.zip
          retention-days: 4
          compression-level: 0
