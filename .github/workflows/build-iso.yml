name: Build ISO
on:
  workflow_run:
    workflows: ["bluebuild"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ISO
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - shadowos-linux
          - shadowos-linux-nvidia
          - shadowos-linux-steam
          - shadowos-linux-nvidia-steam
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - name: Maximize build space
        uses: jlumbroso/free-disk-space@v1.3.1

      - name: Checkout
        uses: actions/checkout@v6

      - name: Fetch Fedora Release (with retries)
        id: clean_version
        shell: bash
        run: |
          MAX_RETRIES=5
          RETRY_COUNT=0
          SUCCESS=false
          
          URL="https://getfedora.org/releases.json"

          until [ $RETRY_COUNT -ge $MAX_RETRIES ] || [ "$SUCCESS" = true ]; do
            echo "Attempting to fetch Fedora releases (Attempt $((RETRY_COUNT + 1))...)"
            
            RESPONSE=$(curl -fsSL "$URL" || echo "failed")

            if [ "$RESPONSE" != "failed" ]; then
              VERSION=$(echo "$RESPONSE" | grep -oE '"version": "[0-9]+"' | grep -oE '[0-9]+' | sort -rn | head -n 1)
              
              if [ -n "$VERSION" ]; then
                echo "stable_one=$VERSION" >> $GITHUB_OUTPUT
                echo "Selected Fedora Version: $VERSION"
                SUCCESS=true
              else
                echo "Connected, but couldn't parse a version number."
              fi
            else
              echo "Connection failed. Waiting 10 seconds..."
              sleep 10
              RETRY_COUNT=$((RETRY_COUNT + 1))
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo "Failed to fetch Fedora versions after $MAX_RETRIES attempts."
            exit 1
          fi

      - name: Build ISO
        uses: jasonn3/build-container-installer@main
        id: iso_build
        with:
          arch: x86_64
          image_name: ${{ matrix.image }}
          image_repo: ghcr.io/shadowos-linux 
          image_tag: latest
          version: ${{ steps.clean_version.outputs.stable_one }}
          variant: cosmic-atomic
          dnf_cache_key: dnf-${{ steps.clean_version.outputs.stable_one }}
          flatpak_remote_refs: app/io.gitlab.librewolf-community/x86_64/stable app/eu.betterbird.Betterbird/x86_64/stable app/org.onlyoffice.desktopeditors/x86_64/stable

      - name: Upload ISO to Job Artifacts
        uses: actions/upload-artifact@v7
        with:
          path: |
            ${{ steps.iso_build.outputs.iso_path }}
            ${{ steps.iso_build.outputs.iso_checksum_path }}
          name: ${{ matrix.image }}-iso-f${{ steps.clean_version.outputs.stable_one }}
          retention-days: 4
          compression-level: 9
