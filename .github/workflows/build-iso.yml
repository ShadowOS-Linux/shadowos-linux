name: Build ISO
on:
  workflow_run:
    workflows: ["bluebuild"]
    types: [completed]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ISO
        uses: jasonn3/build-container-installer@v1.2.4
        id: iso_build
        with:
          arch: x86_64
          image_name: shadowos-linux
          image_repo: ghcr.io/shadowos-linux
          image_tag: latest

      - name: Get current date
        id: date
        run: echo "date=$(date +'%d-%m-%Y')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.date.outputs.date }}-${{ github.run_id }}"
          name: "ShadowOS Linux (${{ steps.date.outputs.date }})"
          body: |
            Automated ISO Build for ShadowOS.
            - Build ID: ${{ github.run_id }}
          files: |
            ${{ steps.iso_build.outputs.iso_path }}
            ${{ steps.iso_build.outputs.iso_checksum_path }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
