name: Build ISO
on:
  workflow_run:
    workflows: ["bluebuild"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ISO
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - shadowos-linux
          - shadowos-linux-nvidia
          - shadowos-linux-steam
          - shadowos-linux-nvidia-steam
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - name: Maximize build space
        uses: jlumbroso/free-disk-space@main
        with: 
         tool-cache: true
        
      - name: Checkout
        uses: actions/checkout@main

      - name: Build ISO
        id: build
        uses: ublue-os/titanoboa@main
        with:
          image-ref: ghcr.io/shadowos-linux/${{ matrix.image }}:latest
          flatpaks-list: ${{ github.workspace }}/files/flatpaks/system-flatpaks.list

      - name: Rename and Checksum ISO
        shell: bash
        run: |
          mkdir -p output
          ISO_NAME="${{ matrix.image }}-latest.iso"
          mv "${{ steps.build.outputs.iso-dest }}" "output/$ISO_NAME"
          (cd output && sha256sum "$ISO_NAME" | tee "$ISO_NAME-CHECKSUM")

      - name: Upload ISO to Job Artifacts
        uses: actions/upload-artifact@main
        with:
          path: output/
          name: ${{ matrix.image }}-iso
          retention-days: 4
          compression-level: 9
          if-no-files-found: error
