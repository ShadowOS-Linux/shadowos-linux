---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /

  - type: dnf
    repos:
      copr:
        - ryanabx/cosmic-epoch
    install:
      packages:
        - cosmic-desktop
        - flatpak
        - lutris
    remove:
      packages:
        - gnome-control-center-filesystem
        - gnome-app-list
        - gnome-menus
        - gnome-online-accounts-libs
        - gnome-bluetooth-libs
        - gnome-keyring
        - gnome-autoar
        - gnome-keyring-pam
        - gnome-online-accounts
        - gnome-desktop3
        - gnome-desktop4
        - gnome-settings-daemon
        - gnome-session
        - xdg-desktop-portal-gnome
        - gnome-control-center
        - gnome-disk-utility
        - NetworkManager-ssh-gnome
        - NetworkManager-openconnect-gnome
        - NetworkManager-vpnc-gnome
        - gnome-bluetooth
        - NetworkManager-openvpn-gnome
        - gnome-color-manager
        - gnome-user-share
        - gnome-remote-desktop
        - desktop-backgrounds-gnome
        - gnome-backgrounds
        - gnome-epub-thumbnailer
        - pinentry-gnome3
        - gnome-user-docs
        - fedora-chromium-config-gnome
        - libgnomekbd
        - gnome-shell-common
        - steamdeck-gnome-presets
        - gnome-randr-rust
        - gnome-icon-theme
        - gnome-shell
        - bazaar
        - malcontent
        - malcontent-control
        - malcontent-libs
        - malcontent-ui-libs
        - rygel
        - Sunshine

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: user
        install:
          - io.gitlab.librewolf-community
          - eu.betterbird.Betterbird
          - org.onlyoffice.desktopeditors
        remove:
          - org.mozilla.firefox
          
  - type: os-release
    properties:
      NAME: ShadowOS
      PRETTY_NAME: ShadowOS
      ID: shadowos
      RELEASE_TYPE: latest
      DEFAULT_HOSTNAME: shadowos
      HOME_URL: https://shadowelixir.github.io
      DOCUMENTATION_URL: https://github.com/ShadowOS-Linux/shadowos-linux
      SUPPORT_URL: https://github.com/ShadowOS-Linux/shadowos-linux/issues
      BUG_REPORT_URL: https://github.com/ShadowOS-Linux/shadowos-linux/issues
      VARIANT_ID: shadowos-linux
      BOOTLOADER_NAME: ShadowOS Linux

  - type: script
    scripts:
      - fastfetch.sh
      - steam-startup.sh

  - type: initramfs
  
  - type: signing # this sets up the proper policy & signing files for signed images to work fully
