name: shadowos-linux-steam
description: Bazzite with Cosmic DE.
base-image: ghcr.io/ublue-os/bazzite-gnome
image-version: stable

modules:
  - from-file: variants/shadowos-linux.yml
  
  - type: dnf
    install:
      packages:
        - steam
        - steam-devices

  - type: os-release
    properties:
      VARIANT_ID: shadowos-linux-steam
