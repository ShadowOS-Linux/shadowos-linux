name: shadowos-linux-nvidia-steam
description: Bazzite Nvidia with Cosmic DE.
base-image: ghcr.io/ublue-os/bazzite-gnome-nvidia-open
image-version: stable

modules:
  - from-file: variants/shadowos-linux-nvidia.yml
  
  - type: dnf
    install:
      packages:
        - steam
        - steam-devices

  - type: os-release
    properties:
      VARIANT_ID: shadowos-linux-nvidia-steam
