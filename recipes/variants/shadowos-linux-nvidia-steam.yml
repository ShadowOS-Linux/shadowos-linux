name: shadowos-linux-nvidia-steam
description: Bazzite Nvidia with Cosmic DE.
base-image: ghcr.io/shadowos-linux/shadowos-linux-nvidia
image-version: latest

modules:
  - from-file: shadowos-linux-nvidia.yml

  - type: dnf
    install:
      packages:
        - steam
        - steam-devices

  - type: os-release
    properties:
      VARIANT_ID: shadowos-linux-nvidia-steam
